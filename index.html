<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daymark</title>
<meta name="description" content="Mark your day. Then move on.">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daymark">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<style>

/* ── CSS Variables ── */
:root {
  --bg:          #f2f2f7;
  --card:        #ffffff;
  --border:      #e0e0e5;
  --text:        #111111;
  --muted:       #6e6e73;
  --accent:      #007AFF;
  --accent-tap:  #0a84ff;
  --dot-border:  #c7c7cc;
  --cell-empty:  #e5e5ea;
  --row-alt:     #f9f9fb;
  --done-bg:     #f0fff4;
  --done-border: #b8f0cb;
  --done-text:   #1a7f3c;
  --toast-bg:    #1c1c1e;
  --toast-text:  #f2f2f7;
  --btn-sec:     #e8f0fe;
  --btn-sec-txt: #0a84ff;
  --danger-bg:   #fff0ee;
  --danger-txt:  #d93025;
  --green-bg:    #eaffef;
  --green-txt:   #188038;
  --input-bg:    #ffffff;
  --input-border:#c8c8cd;
  --header-bg:   #ffffff;
  --tab-bg:      #ffffff;
  --shadow:      0 1px 3px rgba(0,0,0,.07);
  --radius:      14px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #1c1c1e;
    --card:        #2c2c2e;
    --border:      #3a3a3c;
    --text:        #f2f2f7;
    --muted:       #8e8e93;
    --dot-border:  #48484a;
    --cell-empty:  #3a3a3c;
    --row-alt:     #262628;
    --done-bg:     #1a2e20;
    --done-border: #2a5035;
    --done-text:   #4cd974;
    --toast-bg:    #f2f2f7;
    --toast-text:  #1c1c1e;
    --btn-sec:     #1e2d45;
    --btn-sec-txt: #4da6ff;
    --danger-bg:   #3a1a18;
    --danger-txt:  #ff6b61;
    --green-bg:    #1a2e20;
    --green-txt:   #4cd974;
    --input-bg:    #3a3a3c;
    --input-border:#525255;
    --header-bg:   #1c1c1e;
    --tab-bg:      #2c2c2e;
    --shadow:      0 1px 3px rgba(0,0,0,.25);
  }
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  margin: 0; background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
header {
  padding: 14px 16px;
  font-size: 19px; font-weight: 700;
  text-align: center;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5;
}
.container { padding: 12px 16px; padding-bottom: 90px; }
.tabs {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: var(--tab-bg);
  border-top: 1px solid var(--border); z-index: 10;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab {
  flex: 1; padding: 10px 4px 8px; text-align: center;
  font-size: 11px; cursor: pointer; color: var(--muted);
}
.tab-icon { font-size: 20px; display: block; line-height: 1; }
.tab.active { color: var(--accent-tap); }
.tab.active .tab-icon { transform: scale(1.1); }

/* ── Cards ── */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow);
}
.section-title {
  font-size: 12px; font-weight: 700; letter-spacing: .5px;
  margin: 16px 0 6px; padding-left: 2px;
}

/* ── Inputs ── */
input, textarea, select {
  width: 100%; padding: 10px 12px; margin-top: 6px;
  border-radius: 10px; border: 1px solid var(--input-border);
  font-size: 16px; background: var(--input-bg); color: var(--text);
  -webkit-appearance: none; appearance: none;
}
textarea { min-height: 80px; resize: vertical; }
label { font-size: 13px; color: var(--muted); margin-top: 6px; display: block; }

/* ── Buttons ── */
.btn {
  display: block; width: 100%; margin-top: 10px; padding: 13px;
  border-radius: 12px; border: none; background: var(--accent-tap);
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn.secondary { background: var(--btn-sec); color: var(--btn-sec-txt); }
.btn:active { opacity: .85; }
.small-btn {
  padding: 7px 10px; border-radius: 8px; border: none;
  background: var(--btn-sec); color: var(--btn-sec-txt);
  font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.small-btn:active { opacity: .8; }
.small-danger { background: var(--danger-bg); color: var(--danger-txt); }
.small-green  { background: var(--green-bg);  color: var(--green-txt); }
.nav-btn {
  background: none; border: none; font-size: 24px; color: var(--accent);
  cursor: pointer; padding: 4px 12px; border-radius: 8px;
}
.nav-btn:disabled { color: var(--muted); cursor: default; }

/* ── Day Nav ── */
.day-nav-card { padding: 12px; }
.day-nav {
  display: flex; align-items: center; justify-content: space-between;
}
.day-nav-info { text-align: center; }
.day-nav-date { font-weight: 700; font-size: 16px; }
.day-nav-sub  { font-size: 13px; color: var(--muted); margin-top: 2px; }
.progress-bar-wrap {
  height: 4px; background: var(--cell-empty); border-radius: 2px; margin-top: 10px;
}
.progress-bar {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s ease;
}

/* ── Habits ── */
.habit {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 12px; background: var(--card);
  margin-bottom: 8px; border-radius: 12px; box-shadow: var(--shadow);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.habit-satisfied { opacity: .7; }
.habit-skipped   { opacity: .5; }
.habit-info { flex: 1; min-width: 0; }
.habit-name-row { font-size: 16px; display: flex; align-items: center; gap: 6px; }
.freq-note { font-size: 12px; color: var(--accent); background: var(--btn-sec); border-radius: 6px; padding: 2px 6px; }
.dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--dot-border); flex: 0 0 auto;
  transition: background .15s, border-color .15s;
}
.dot.done    { background: var(--accent); border-color: var(--accent); }
.dot.skipped { background: var(--muted);  border-color: var(--muted); opacity: .5; }
.skip-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 14px; padding: 4px 8px; cursor: pointer;
}
.skip-btn.active { background: var(--btn-sec); color: var(--accent); border-color: var(--accent); }

/* ── Category badge ── */
.cat-badge {
  font-size: 11px; font-weight: 600; border-radius: 6px;
  padding: 2px 7px; display: inline-block;
}

/* ── Done Day ── */
.done-day {
  background: var(--done-bg); border: 1px solid var(--done-border);
  color: var(--done-text);
}

/* ── Weekly Review ── */
.review-prompt { border-left: 3px solid var(--accent); }
.review-prompt strong { display: block; margin-bottom: 4px; }

/* ── Month Nav ── */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0 8px;
}
.month-nav-label { font-size: 17px; font-weight: 700; }

/* ── Score Grid ── */
.score-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; margin-bottom: 12px;
}
.metric {
  text-align: center; background: var(--card);
  padding: 14px 8px; border-radius: var(--radius);
  font-size: 22px; font-weight: 800; box-shadow: var(--shadow);
}
.metric small {
  display: block; font-size: 11px; font-weight: 500;
  color: var(--muted); margin-top: 4px;
}
.metric.at-risk { color: #ff9500; }

/* ── Weight ── */
.weight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.chart { width: 100%; margin-top: 8px; display: block; }

/* ── Goals ── */
.goal-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.goal-row:last-child { border-bottom: none; }
.goal-text { flex: 1; font-size: 15px; }
.goal-chip { font-size: 12px; color: var(--muted); margin-top: 2px; }
.goal-due  { font-size: 11px; color: var(--accent); margin-left: 6px;
             background: var(--btn-sec); border-radius: 5px; padding: 1px 5px; }
.done-goal { opacity: .5; }
.goal-edit-row {
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.goal-edit-row:last-child { border-bottom: none; }
.goal-edit-text    { font-size: 15px; margin-bottom: 2px; }
.goal-edit-progress{ font-size: 12px; margin-bottom: 6px; }
.goal-edit-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── Month Grid ── */
.grid-card { overflow: hidden; }
.grid-wrap {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin: 10px -14px -14px; padding: 0 14px 14px;
}
table { border-collapse: separate; border-spacing: 4px; min-width: max-content; }
th { font-size: 11px; color: var(--muted); white-space: nowrap; text-align: center; }
.habit-name-th {
  position: sticky; left: 0; background: var(--card);
  z-index: 2; padding-right: 10px; text-align: left;
  font-size: 13px; font-weight: 600; max-width: 120px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-left: 8px;
}
.today-th { color: var(--accent); font-weight: 700; }
.cell {
  width: 28px; height: 28px; border-radius: 8px;
  text-align: center; vertical-align: middle;
  font-size: 14px; user-select: none; cursor: pointer;
}
.cell-done  { background: #34c759; color: #fff; }
.cell-empty { background: var(--cell-empty); }
.cell-skip  { background: var(--muted); opacity: .35; }
.cell-na    { background: transparent; }
.cell-today { outline: 2px solid var(--accent); }
.alt-row .habit-name-th,
.alt-row td { background: var(--row-alt); }
/* Override alt-row background for coloured cells */
.alt-row td.cell-done  { background: #34c759; }
.alt-row td.cell-skip  { background: var(--muted); }
.alt-row td.cell-na    { background: transparent; }

/* ── Life / Moments ── */
.moment-entry {
  padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.moment-entry:last-child { border-bottom: none; }
.moment-date { font-weight: 700; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
.moment-text { font-size: 15px; line-height: 1.5; }
.moment-tap  { font-size: 12px; margin-top: 4px; }

/* ── Stats / Heatmap ── */
.heatmap-grid {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
}
.hm-month { }
.hm-month-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-align: center; }
.hm-days { display: grid; grid-template-columns: repeat(7, 10px); gap: 2px; }
.hm-cell { width: 10px; height: 10px; border-radius: 2px; background: var(--cell-empty); }
.hm-future { opacity: .2; }
.hm-na     { background: transparent; }
.heatmap-legend {
  display: flex; align-items: center; gap: 4px;
  margin-top: 8px; font-size: 11px; color: var(--muted);
}
.heatmap-legend .hm-cell { flex: 0 0 auto; }

/* ── Settings ── */
.habit-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.habit-row:last-of-type { border-bottom: none; }
.habit-row-info { flex: 1; min-width: 0; }
.habit-row-name { font-size: 15px; font-weight: 600; }
.habit-row-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.habit-row-actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

.cat-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cat-row:last-of-type { border-bottom: none; }
.cat-dot { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 auto; }
.cat-name { flex: 1; font-size: 15px; font-weight: 600; }
.cat-count { font-size: 12px; }

.inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Toast ── */
.toast {
  position: fixed; left: 16px; right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 76px);
  background: var(--toast-bg); color: var(--toast-text);
  padding: 12px 14px; border-radius: 14px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 30; box-shadow: 0 4px 20px rgba(0,0,0,.25);
  animation: toastIn .2s ease;
}
.toast button {
  border: none; background: var(--card); color: var(--text);
  padding: 6px 12px; border-radius: 8px; font-weight: 700; cursor: pointer;
}
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

/* ── Dialog ── */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 50; display: flex; align-items: center; justify-content: center;
  padding: 24px; animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.dialog {
  background: var(--card); border-radius: 18px;
  padding: 22px; width: 100%; max-width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
.dialog-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.dialog-body  { font-size: 15px; color: var(--muted); margin-bottom: 18px; white-space: pre-line; }
.dialog-btns  { display: flex; gap: 8px; justify-content: flex-end; }
.dialog-btn {
  padding: 10px 18px; border-radius: 10px; border: none;
  background: var(--btn-sec); color: var(--btn-sec-txt);
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.dialog-btn.danger { background: var(--danger-bg); color: var(--danger-txt); }
.dialog-body input,
.dialog-body select,
.dialog-body textarea { margin-top: 4px; }

/* ── Onboarding ── */
.onboarding { text-align: center; padding: 32px 20px; }
.onboarding-logo { font-size: 48px; color: var(--accent); margin-bottom: 12px; }
.onboarding h2 { font-size: 26px; margin: 0 0 6px; }
.onboarding p  { font-size: 15px; line-height: 1.6; }
.onboarding h3 { font-size: 16px; margin: 20px 0 10px; }

/* ── Utilities ── */
.muted   { color: var(--muted); }
.muted   small { font-size: 12px; }
h3 { margin: 14px 0 4px; font-size: 15px; }

  /* ── Onboarding ── */
  .onboarding {
    padding: 24px 4px 8px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .ob-logo {
    font-size: 44px; color: var(--accent);
    text-align: center; margin-bottom: 16px;
    display: block;
  }
  .onboarding h2 {
    font-size: 26px; font-weight: 800;
    text-align: center; margin-bottom: 6px; letter-spacing: -0.5px;
  }
  .ob-tagline {
    text-align: center; color: var(--muted);
    font-size: 15px; margin-bottom: 20px;
  }

  /* Install card */
  .ob-install-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-bottom: 4px;
    border: 1px solid var(--border);
  }
  .ob-install-title {
    font-weight: 700; font-size: 15px; margin-bottom: 8px;
  }
  .ob-install-desc {
    font-size: 14px; color: var(--muted); margin-bottom: 14px; line-height: 1.5;
  }
  .ob-install-steps { display: flex; flex-direction: column; gap: 10px; }
  .ob-install-step {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; line-height: 1.4;
  }
  .ob-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .ob-icon { font-size: 16px; }
  .ob-note {
    margin-top: 12px; font-size: 13px;
    color: var(--muted); line-height: 1.5;
    background: var(--bg); border-radius: 8px; padding: 8px 10px;
  }

  /* How it works */
  .ob-steps { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
  .ob-how-step {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--card); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow);
  }
  .ob-how-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .ob-how-text { display: flex; flex-direction: column; gap: 3px; }
  .ob-how-text strong { font-size: 15px; font-weight: 700; }
  .ob-how-text span { font-size: 13px; color: var(--muted); line-height: 1.4; }
  .ob-privacy {
    background: var(--card); border-radius: var(--radius);
    padding: 12px 14px; font-size: 13px; color: var(--muted);
    text-align: center; border: 1px solid var(--border);
  }

  /* Choice cards */
  .ob-choice-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .ob-choice-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; cursor: pointer;
    border: 2px solid var(--border);
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ob-choice-card:active { background: var(--bg); border-color: var(--accent); }
  .ob-choice-icon {
    font-size: 22px; color: var(--accent);
    margin-bottom: 6px; display: block;
  }
  .ob-choice-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .ob-choice-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* First-use tip */
  .first-tip {
    position: fixed; bottom: calc(env(safe-area-inset-bottom) + 76px);
    left: 12px; right: 12px; z-index: 40;
    animation: tipIn .3s ease;
    transition: opacity .3s ease;
  }
  @keyframes tipIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .first-tip-inner {
    background: #12183a; color: #fff;
    border-radius: 16px; padding: 16px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .first-tip-title {
    font-size: 15px; font-weight: 700; margin-bottom: 6px;
  }
  .first-tip-body {
    font-size: 13px; color: rgba(255,255,255,.75);
    line-height: 1.5; margin-bottom: 12px;
  }
  .first-tip-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }


  /* ── Auto backup status ── */
  .auto-backup-status {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg); border-radius: 10px;
    padding: 12px; border: 1px solid var(--border);
  }
  .auto-backup-icon { font-size: 24px; flex-shrink: 0; }
  .auto-backup-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .auto-backup-sub   { font-size: 12px; color: var(--muted); }

</style>
</head>
<body>

<header>Daymark</header>
<div class="container" id="content"></div>

<div class="tabs">
  <div class="tab" data-tab="log" onclick="showTab('log')">
    <span class="tab-icon">◆</span>Log
  </div>
  <div class="tab" data-tab="progress" onclick="showTab('progress')">
    <span class="tab-icon">📊</span>Progress
  </div>
  <div class="tab" data-tab="life" onclick="showTab('life')">
    <span class="tab-icon">📖</span>Life
  </div>
  <div class="tab" data-tab="stats" onclick="showTab('stats')">
    <span class="tab-icon">🔥</span>Stats
  </div>
  <div class="tab" data-tab="settings" onclick="showTab('settings')">
    <span class="tab-icon">⚙️</span>Settings
  </div>
</div>

<script src="app.js"></script>
<script src="ui.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
