<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#f4f4f4;color:#111}
header{padding:16px;font-size:20px;font-weight:700;text-align:center;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:5}
.container{padding:16px;margin-bottom:84px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.habit{display:flex;align-items:center;gap:12px;padding:14px;background:#fff;margin-bottom:10px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);cursor:pointer}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #ddd;z-index:10}
.tab{flex:1;padding:14px 6px;text-align:center;font-size:13px;cursor:pointer}
.section-title{margin:18px 0 6px 0;font-weight:700;color:#666;font-size:13px}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid #D1D1D6;flex:0 0 auto}
.dot.done{background:#007AFF;border-color:#007AFF}
input,textarea,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box;background:#fff}
textarea{min-height:80px}
.btn{margin-top:10px;padding:11px;border-radius:10px;border:none;background:#0a84ff;color:#fff;font-weight:700;width:100%}
.secondary{background:#e9eefb;color:#0a84ff}
.archive{background:#ff3b30}
.row-actions{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;margin-bottom:8px}
.list-line{padding:10px 0;border-bottom:1px solid #eee}
.muted{color:#666;font-size:14px}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.metric{text-align:center;background:#fff;padding:12px;border-radius:12px;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.metric small{display:block;font-weight:500;color:#666;margin-top:4px}
.weight-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chart{width:100%;height:180px;margin-top:8px;background:#fafafa;border-radius:12px;border:1px solid #eee}
.grid-wrap{background:#fff;border-radius:12px;padding:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 1px 2px rgba(0,0,0,.04)}
table{border-collapse:separate;border-spacing:6px;min-width:max-content}
th{font-size:12px;color:#666;white-space:nowrap}
.habit-name{position:sticky;left:0;background:#fff;z-index:2;padding-right:8px;text-align:left}
.cell{width:32px;height:32px;border-radius:10px;text-align:center;vertical-align:middle;font-weight:700;user-select:none}
.done-cell{background:#34c759;color:#fff}
.empty-cell{background:#ebebef;color:transparent}
.today-cell{outline:3px solid #0a84ff}
.month-picker{margin-bottom:12px}
.goal-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.goal-chip{font-size:12px;color:#666}
</style>
</head>
<body>
<header>Habit Tracker</header>
<div class="container" id="content"></div>
<div class="tabs">
<div class="tab" onclick="showToday()">Today</div>
<div class="tab" onclick="showProgress()">Progress</div>
<div class="tab" onclick="showLife()">Life</div>
<div class="tab" onclick="showSettings()">Settings</div>
</div>
<script src="app.js"></script>
</body>
</html>
