<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daymark</title>
<meta name="description" content="Mark your day. Then move on.">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
/* ── Base ── */
:root {
  --bg: #f4f4f4;
  --card: #fff;
  --border: #ddd;
  --text: #111;
  --muted: #666;
  --accent: #007AFF;
  --accent-tap: #0a84ff;
  --section-label: #666;
  --dot-border: #D1D1D6;
  --cell-empty: #ebebef;
  --row-alt: #fafafa;
  --done-bg: #f0fff4;
  --done-border: #c8f0d0;
  --done-text: #188038;
  --toast-bg: #111;
  --toast-text: #fff;
  --small-btn: #e9eefb;
  --small-btn-text: #0a84ff;
  --small-danger: #ffe7e5;
  --small-danger-text: #d93025;
  --small-green: #e7f7ea;
  --small-green-text: #188038;
  --input-border: #ccc;
  --input-bg: #fff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --card: #2c2c2e;
    --border: #3a3a3c;
    --text: #f2f2f7;
    --muted: #8e8e93;
    --section-label: #8e8e93;
    --dot-border: #48484a;
    --cell-empty: #3a3a3c;
    --row-alt: #252527;
    --done-bg: #1a2e1f;
    --done-border: #2a4a30;
    --done-text: #34c759;
    --toast-bg: #f2f2f7;
    --toast-text: #111;
    --small-btn: #2c3a52;
    --small-btn-text: #4da3ff;
    --small-danger: #3a1f1e;
    --small-danger-text: #ff6961;
    --small-green: #1a2e1f;
    --small-green-text: #34c759;
    --input-border: #48484a;
    --input-bg: #3a3a3c;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:var(--bg);color:var(--text)}
header{padding:16px;font-size:20px;font-weight:700;text-align:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.container{padding:16px;margin-bottom:84px}
.card{background:var(--card);padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.habit{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);margin-bottom:10px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--border);z-index:10}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:13px;cursor:pointer;color:var(--muted)}
.tab.active{color:var(--accent-tap);font-weight:700;border-top:3px solid var(--accent-tap)}
.section-title{margin:18px 0 6px 0;font-weight:700;color:var(--section-label);font-size:13px}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--dot-border);flex:0 0 auto}
.dot.done{background:#007AFF;border-color:#007AFF}
input,textarea,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid var(--input-border);font-size:16px;box-sizing:border-box;background:var(--input-bg);color:var(--text)}
textarea{min-height:80px}
.btn{margin-top:10px;padding:11px;border-radius:10px;border:none;background:var(--accent-tap);color:#fff;font-weight:700;width:100%;cursor:pointer}
.secondary{background:var(--small-btn);color:var(--small-btn-text)}
.row-actions{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;margin-bottom:8px}
.small-btn{padding:8px 10px;border-radius:8px;border:none;background:var(--small-btn);color:var(--small-btn-text);font-weight:700;cursor:pointer}
.small-danger{background:var(--small-danger);color:var(--small-danger-text)}
.small-green{background:var(--small-green);color:var(--small-green-text)}
.list-line{padding:10px 0;border-bottom:1px solid var(--border)}
.muted{color:var(--muted);font-size:14px}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.metric{text-align:center;background:var(--card);padding:12px;border-radius:12px;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.metric small{display:block;font-weight:500;color:var(--muted);margin-top:4px}
.weight-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chart{width:100%;height:180px;margin-top:8px;background:var(--bg);border-radius:12px;border:1px solid var(--border)}
.grid-wrap{background:var(--card);border-radius:12px;padding:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 1px 2px rgba(0,0,0,.06)}
table{border-collapse:separate;border-spacing:6px;min-width:max-content}
th{font-size:12px;color:var(--muted);white-space:nowrap}
.habit-name{position:sticky;left:0;background:var(--card);z-index:2;padding-right:8px;text-align:left}
.cell{width:32px;height:32px;border-radius:10px;text-align:center;vertical-align:middle;font-weight:700;user-select:none;cursor:pointer}
.done-cell{background:#34c759;color:#fff}
.empty-cell{background:var(--cell-empty);color:transparent}
.today-cell{outline:3px solid var(--accent)}
.alt-row th.habit-name,.alt-row td{background:var(--row-alt)}
.month-picker{margin-bottom:12px}
.goal-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.goal-chip{font-size:12px;color:var(--muted)}
.done-day{background:var(--done-bg);border:1px solid var(--done-border)}
.done-day strong{color:var(--done-text)}
.toast{position:fixed;left:16px;right:16px;bottom:96px;background:var(--toast-bg);color:var(--toast-text);padding:12px 14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast button{border:none;background:var(--card);color:var(--text);padding:6px 10px;border-radius:8px;font-weight:700;cursor:pointer}
.inline-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.unit-label{font-size:13px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<header>Daymark</header>
<div class="container" id="content"></div>
<div class="tabs">
  <div class="tab" data-tab="today" onclick="showToday()">Log</div>
  <div class="tab" data-tab="progress" onclick="showProgress()">Progress</div>
  <div class="tab" data-tab="life" onclick="showLife()">Life</div>
  <div class="tab" data-tab="settings" onclick="showSettings()">Settings</div>
</div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
